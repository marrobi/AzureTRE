#cloud-config
package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release

runcmd:
  # Install Docker
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker
  # Create Galaxy data directories
  - mkdir -p /galaxy/export /galaxy/database
  - chmod -R 777 /galaxy
  # Run Galaxy container with Docker-in-Docker support for interactive tools
  - |
    docker run -d \
      --name galaxy \
      --restart unless-stopped \
      --privileged \
      -p 80:80 \
      -v /galaxy/export:/export \
      -v /galaxy/database:/galaxy/server/database \
      -v /var/run/docker.sock:/var/run/docker.sock \
      -e GALAXY_CONFIG_ALLOW_USER_CREATION=True \
      -e GALAXY_CONFIG_ALLOW_USER_DELETION=True \
      -e NONUSE=nodejs,proftp \
      quay.io/galaxyproject/galaxy:${galaxy_image_tag}
